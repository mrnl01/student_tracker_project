<!DOCTYPE html>
<html>
<head>
    <title>Add Study Log</title>
</head>
<body>

<h2>Add Study Log</h2>

<form method="POST">
    <label>Hours Studied:</label><br>
    <input type="number" step="0.5" name="hours" required>
    <br><br>

    <label>What did you learn?</label><br>
    <textarea name="notes"></textarea>
    <br><br>

    <label>
        <input type="checkbox" name="completed"> Mark Completed
    </label>
    <br><br>

    <button type="submit">Save Log</button>
</form>

<br>
<a href="/">⬅ Back</a>

</body>
</html>
