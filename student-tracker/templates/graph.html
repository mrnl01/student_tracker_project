<!DOCTYPE html>
<html>
<head>
    <title>Study Graph</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>📊 Study Hours Graph</h2>

<canvas id="myChart"></canvas>

<script>
    // Get data safely from Flask
    const chartData = JSON.parse('{{ data | tojson | safe }}');

    // Extract labels and values
    const labels = chartData.map(row => row[0]);
    const hours = chartData.map(row => row[1]);

    const ctx = document.getElementById('myChart');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Study Hours',
                data: hours,
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>

<br>
<a href="/">⬅ Back</a>

</body>
</html>
