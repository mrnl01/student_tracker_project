<!DOCTYPE html>
<html>
<head>
    <title>Set Goal</title>
</head>
<body>

<h2>🎯 Set Goal</h2>

<form method="POST">

    <label>Goal Type:</label><br>
    <select name="type">
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
    </select>
    <br><br>

    <label>Target Hours:</label><br>
    <input type="number" step="0.5" name="target" required>
    <br><br>

    <label>Reward:</label><br>
    <input type="text" name="reward">
    <br><br>

    <label>Punishment:</label><br>
    <input type="text" name="punishment">
    <br><br>

    <button type="submit">Save Goal</button>

</form>

<br>
<a href="/">⬅ Back</a>

</body>
</html>
