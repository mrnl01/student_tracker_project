<!DOCTYPE html>
<html>
<head>
    <title>Set Goal</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body class="goals">
    <div class="stars"></div>
<div class="container">

    <h2>🎯 Set Goal</h2>

    <div class="card">
        <form method="POST">

            <label>Goal Type:</label><br>
            <select name="type">
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
            </select>
            <br><br>

            <label>Target Hours:</label><br>
            <input type="number" step="0.5" name="target" required>
            <br><br>

            <label>Reward:</label><br>
            <input type="text" name="reward" placeholder="e.g. Watch Netflix">
            <br><br>

            <label>Punishment:</label><br>
            <input type="text" name="punishment" placeholder="e.g. No phone for 1 day">
            <br><br>

            <button type="submit">Save Goal</button>
        </form>
    </div>

    <br>

    <div class="card">
        <a href="/">⬅ Back</a>
    </div>

</div>
</body>
</html>
